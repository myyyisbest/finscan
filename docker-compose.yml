# finscan Docker Compose 部署配置
# 使用: docker compose up -d
version: "3.9"

services:
  # ---- MariaDB 数据库 ----
  db:
    image: mariadb:10.11
    container_name: finscan-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-finscan_root_pwd}
      MYSQL_DATABASE: finscan
      MYSQL_USER: finscan
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-finscan_pwd}
    volumes:
      - ./data/mysql:/var/lib/mysql  # 持久化存储
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- FastAPI 后端 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finscan-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://finscan:${MYSQL_PASSWORD:-finscan_pwd}@db:3306/finscan?charset=utf8mb4
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      COLLECT_SCOPE: ${COLLECT_SCOPE:-sample}
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data  # SQLite 开发模式的数据目录（生产用 MariaDB 时可注释）
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ---- Nginx 反向代理 + 静态文件 ----
  nginx:
    image: nginx:alpine
    container_name: finscan-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro  # 前端构建产物
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
